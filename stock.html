<!DOCTYPE html>
<html lang="th" data-theme="corporate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VING — สินค้า &amp; ปรับเกรด</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-display: "Chakra Petch", sans-serif;
      --font-body: "Sarabun", sans-serif;
    }
  </style>
</head>
<body class="font-body min-h-screen bg-base-200">

  <!-- header -->
  <div class="navbar bg-base-100 shadow sticky top-0 z-40">
    <div class="flex-1 gap-2">
      <a href="index.html" class="btn btn-ghost btn-sm btn-circle"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
      <div>
        <p class="font-display font-bold leading-tight"><i data-lucide="package-search" class="w-4 h-4 inline"></i> สินค้า</p>
        <p class="text-xs opacity-50 leading-tight" id="branchLabel">—</p>
      </div>
    </div>
  </div>

  <div class="max-w-3xl mx-auto p-4">

    <!-- search + filter -->
    <div class="flex gap-2 mb-4">
      <label class="input input-bordered flex items-center gap-2 flex-1">
        <i data-lucide="search" class="w-4 h-4 opacity-50"></i>
        <input id="search" type="text" class="grow" placeholder="ค้นหาชื่อ / SKU" />
      </label>
      <select id="cat" class="select select-bordered"><option value="">ทุกหมวด</option></select>
    </div>

    <div id="grid" class="grid gap-2 sm:grid-cols-2"></div>
    <div id="empty" class="text-center opacity-40 py-12 hidden">
      <i data-lucide="package-x" class="w-12 h-12 mx-auto mb-2"></i>
      <p id="emptyMsg">ไม่มีสินค้า</p>
    </div>
  </div>

  <div id="toast" class="toast toast-top toast-center z-50"></div>

  <!-- grade modal -->
  <dialog id="dlgGrade" class="modal">
    <div class="modal-box max-w-md">
      <h3 class="font-display font-bold text-lg">ปรับเกรดสินค้า</h3>
      <p class="text-sm opacity-60" id="gProduct">—</p>
      <p class="text-xs font-mono opacity-40 mb-3" id="gSku">—</p>

      <div class="form-control mb-3">
        <label class="label py-1"><span class="label-text font-semibold">ประเภท</span></label>
        <div class="join w-full" id="gradeBtns">
          <button type="button" data-g="ตกเกรด" class="btn join-item flex-1">ตกเกรด</button>
          <button type="button" data-g="หลุด QC" class="btn join-item flex-1">หลุด QC</button>
          <button type="button" data-g="ส่งคืน" class="btn join-item flex-1">ส่งคืน</button>
        </div>
      </div>

      <div class="form-control mb-3">
        <label class="label py-1"><span class="label-text font-semibold">จำนวน (ชิ้น)</span></label>
        <input id="gQty" type="number" min="1" value="1" class="input input-bordered w-full" />
      </div>

      <div class="form-control mb-3">
        <label class="label py-1"><span class="label-text font-semibold">รูปยืนยัน <span class="text-error">*บังคับ</span></span></label>
        <input id="gPhoto" type="file" accept="image/*" capture="environment" class="file-input file-input-bordered w-full" />
        <img id="gPreview" class="hidden mt-2 rounded-lg max-h-48 mx-auto border border-base-300" />
      </div>

      <div class="form-control mb-3">
        <label class="label py-1"><span class="label-text">หมายเหตุ (ถ้ามี)</span></label>
        <textarea id="gNote" class="textarea textarea-bordered" rows="2" placeholder="เช่น พื้นแยก, สีไม่ตรง"></textarea>
      </div>

      <div class="modal-action">
        <button id="btnGradeSave" class="btn btn-primary" disabled>
          <span id="gSaveLabel">บันทึก</span>
          <span id="gSaveSpin" class="loading loading-spinner loading-sm hidden"></span>
        </button>
        <button type="button" id="btnGradeCancel" class="btn">ยกเลิก</button>
      </div>
    </div>
  </dialog>

  <script>
    // ── ฝัง Web App URL ตรงนี้ (ลงท้าย /exec) — ว่าง = ใช้จากปุ่ม ⚙ หน้าแรก ──
    const HARDCODED_API = 'https://script.google.com/macros/s/AKfycby7juEv2-FTe4_UpxgEOo76yL0UZvWHZobe1C5ezl6TafCmz6eGG1rPPolu0jCxZ5uY/exec';

    const API_KEY = 'ving_api', SES_KEY = 'ving_session', SKUS_KEY = 'ving_skus';
    function getApi() {
      const h = HARDCODED_API.indexOf('http') === 0 ? HARDCODED_API : '';
      return h || localStorage.getItem(API_KEY) || '';
    }
    const ses = (() => { try { return JSON.parse(localStorage.getItem(SES_KEY) || 'null'); } catch { return null; } })();
    if (!ses || !ses.email) { location.href = 'index.html'; }

    let SKUS = [];
    let cur = null;            // current product in modal
    let curGrade = '';         // selected grade type
    let curPhotoB64 = '';      // base64 (no prefix)
    let curPhotoMime = '';

    function toast(msg, type='info') {
      const cls = { info:'alert-info', success:'alert-success', error:'alert-error', warning:'alert-warning' }[type] || 'alert-info';
      const el = document.createElement('div');
      el.className = 'alert ' + cls + ' shadow';
      el.textContent = msg;
      document.getElementById('toast').appendChild(el);
      setTimeout(() => el.remove(), 2600);
    }
    async function apiPost(payload) {
      const url = getApi();
      if (!url) throw new Error('ยังไม่ได้ตั้งค่า API (กลับหน้าแรก กด ⚙)');
      const res = await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) });
      return res.json();
    }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    // ── load SKUs ──
    async function loadSkus() {
      const cached = localStorage.getItem(SKUS_KEY);
      if (cached) { try { SKUS = JSON.parse(cached); buildCats(); render(); } catch {} }
      try {
        const r = await apiPost({ action: 'load_skus' });
        if (r.ok) { SKUS = r.skus || []; localStorage.setItem(SKUS_KEY, JSON.stringify(SKUS)); buildCats(); render(); }
      } catch (err) {
        if (!SKUS.length) { document.getElementById('emptyMsg').textContent = 'โหลดสินค้าไม่ได้: ' + err.message; showEmpty(); }
      }
    }
    function buildCats() {
      const cats = [...new Set(SKUS.map(s => s.category).filter(Boolean))].sort();
      const sel = document.getElementById('cat');
      sel.innerHTML = '<option value="">ทุกหมวด</option>' + cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    }
    function showEmpty(){ document.getElementById('grid').innerHTML=''; document.getElementById('empty').classList.remove('hidden'); lucide.createIcons(); }

    // ── render product grid ──
    function render() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const cat = document.getElementById('cat').value;
      const filtered = SKUS.filter(s => {
        if (cat && s.category !== cat) return false;
        if (!q) return true;
        return (s.product_name || '').toLowerCase().includes(q) || (s.sku || '').toLowerCase().includes(q);
      });
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      if (!filtered.length) { grid.innerHTML=''; document.getElementById('emptyMsg').textContent = SKUS.length ? 'ไม่พบสินค้าที่ค้นหา' : 'กำลังโหลด…'; empty.classList.remove('hidden'); lucide.createIcons(); return; }
      empty.classList.add('hidden');
      grid.innerHTML = filtered.map((s, i) => `
        <div class="card bg-base-100 shadow-sm">
          <div class="card-body p-3">
            <p class="font-medium leading-tight">${escapeHtml(s.product_name || '(ไม่มีชื่อ)')}</p>
            <p class="text-xs font-mono opacity-50">${escapeHtml(s.sku)}${s.size ? ' · ไซส์ ' + escapeHtml(s.size) : ''}</p>
            <button class="btn btn-outline btn-sm btn-primary mt-2" data-idx="${SKUS.indexOf(s)}">
              <i data-lucide="clipboard-check" class="w-4 h-4"></i> ปรับเกรด
            </button>
          </div>
        </div>`).join('');
      lucide.createIcons();
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('cat').addEventListener('change', render);
    document.getElementById('grid').addEventListener('click', e => {
      const btn = e.target.closest('button[data-idx]');
      if (!btn) return;
      openGrade(SKUS[Number(btn.getAttribute('data-idx'))]);
    });

    // ── grade modal ──
    function openGrade(p) {
      cur = p; curGrade = ''; curPhotoB64 = ''; curPhotoMime = '';
      document.getElementById('gProduct').textContent = p.product_name || '(ไม่มีชื่อ)';
      document.getElementById('gSku').textContent = p.sku + (p.size ? ' · ไซส์ ' + p.size : '');
      document.getElementById('gQty').value = 1;
      document.getElementById('gNote').value = '';
      document.getElementById('gPhoto').value = '';
      const prev = document.getElementById('gPreview'); prev.classList.add('hidden'); prev.src = '';
      [...document.querySelectorAll('#gradeBtns button')].forEach(b => b.classList.remove('btn-primary'));
      updateSaveState();
      document.getElementById('dlgGrade').showModal();
    }

    document.querySelectorAll('#gradeBtns button').forEach(b => {
      b.addEventListener('click', () => {
        curGrade = b.getAttribute('data-g');
        [...document.querySelectorAll('#gradeBtns button')].forEach(x => x.classList.remove('btn-primary'));
        b.classList.add('btn-primary');
        updateSaveState();
      });
    });

    // photo → downscale → base64
    document.getElementById('gPhoto').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) { curPhotoB64=''; updateSaveState(); return; }
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const max = 1280;
          let { width, height } = img;
          if (width > max || height > max) {
            const r = Math.min(max/width, max/height);
            width = Math.round(width*r); height = Math.round(height*r);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
          curPhotoMime = 'image/jpeg';
          curPhotoB64 = dataUrl.split(',')[1];
          const prev = document.getElementById('gPreview');
          prev.src = dataUrl; prev.classList.remove('hidden');
          updateSaveState();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    function updateSaveState() {
      const qty = Number(document.getElementById('gQty').value);
      const ok = curGrade && curPhotoB64 && qty >= 1;
      document.getElementById('btnGradeSave').disabled = !ok;
    }
    document.getElementById('gQty').addEventListener('input', updateSaveState);

    document.getElementById('btnGradeCancel').addEventListener('click', () => document.getElementById('dlgGrade').close());

    document.getElementById('btnGradeSave').addEventListener('click', async () => {
      if (!curGrade || !curPhotoB64) { toast('ต้องเลือกประเภทและถ่ายรูปก่อน', 'warning'); return; }
      const btn = document.getElementById('btnGradeSave');
      document.getElementById('gSaveLabel').classList.add('hidden');
      document.getElementById('gSaveSpin').classList.remove('hidden');
      btn.disabled = true;
      try {
        const r = await apiPost({
          action: 'save_grade',
          branch_code: ses.branch_code, branch_name: ses.branch_name, email: ses.email,
          sku: cur.sku, product_name: cur.product_name,
          grade_type: curGrade, qty: Number(document.getElementById('gQty').value),
          note: document.getElementById('gNote').value.trim(),
          photo_base64: curPhotoB64, photo_mime: curPhotoMime,
        });
        if (r.ok) {
          document.getElementById('dlgGrade').close();
          toast('บันทึกปรับเกรด "' + curGrade + '" สำเร็จ ✓', 'success');
        } else {
          toast('บันทึกไม่สำเร็จ: ' + (r.error || ''), 'error');
        }
      } catch (err) {
        toast('บันทึกไม่สำเร็จ — รูปยังอยู่ ลองใหม่: ' + err.message, 'error');
      } finally {
        document.getElementById('gSaveLabel').classList.remove('hidden');
        document.getElementById('gSaveSpin').classList.add('hidden');
        updateSaveState();
      }
    });

    // ── init ──
    document.getElementById('branchLabel').textContent = ses.branch_name || ses.branch_code || '';
    loadSkus();
  </script>
</body>
</html>
