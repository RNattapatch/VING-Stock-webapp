<!DOCTYPE html>
<html lang="th" data-theme="corporate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VING — นับสต็อก</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-display: "Chakra Petch", sans-serif;
      --font-body: "Sarabun", sans-serif;
    }
    @keyframes pop { 0% { transform: scale(1); } 40% { transform: scale(1.06); background-color: var(--color-success); color: #fff; } 100% { transform: scale(1); } }
    .pop { animation: pop .45s ease; }
  </style>
</head>
<body class="font-body min-h-screen bg-base-200">

  <!-- header -->
  <div class="navbar bg-base-100 shadow sticky top-0 z-40">
    <div class="flex-1 gap-2">
      <a href="index.html" class="btn btn-ghost btn-sm btn-circle"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
      <div>
        <p class="font-display font-bold leading-tight"><i data-lucide="scan-barcode" class="w-4 h-4 inline"></i> นับสต็อก</p>
        <p class="text-xs opacity-50 leading-tight" id="branchLabel">—</p>
      </div>
    </div>
    <div class="flex-none text-right mr-2">
      <p class="text-xs opacity-50 leading-tight">รอบนี้</p>
      <p class="font-mono text-xs leading-tight" id="sessionLabel">—</p>
    </div>
  </div>

  <div class="max-w-2xl mx-auto p-4">

    <!-- scan box -->
    <div class="card bg-base-100 shadow-lg mb-4">
      <div class="card-body p-4">
        <label class="text-sm font-semibold opacity-70 mb-1">ยิง barcode / พิมพ์ SKU แล้ว Enter</label>
        <input id="scan" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="พร้อมยิง…" class="input input-bordered input-lg w-full font-mono text-lg" />
        <div class="flex gap-2 mt-2 text-center">
          <div class="flex-1 bg-base-200 rounded-lg py-2">
            <p class="text-2xl font-display font-bold text-primary" id="totalQty">0</p>
            <p class="text-xs opacity-50">ชิ้นรวม</p>
          </div>
          <div class="flex-1 bg-base-200 rounded-lg py-2">
            <p class="text-2xl font-display font-bold" id="totalSku">0</p>
            <p class="text-xs opacity-50">SKU</p>
          </div>
        </div>
      </div>
    </div>

    <!-- action buttons -->
    <div class="flex gap-2 mb-4">
      <button id="btnSave" class="btn btn-primary flex-1">
        <i data-lucide="save" class="w-4 h-4"></i>
        <span id="saveLabel">บันทึกการนับ</span>
        <span id="saveSpin" class="loading loading-spinner loading-sm hidden"></span>
      </button>
      <button id="btnReset" class="btn btn-ghost"><i data-lucide="rotate-ccw" class="w-4 h-4"></i> เริ่มรอบใหม่</button>
    </div>

    <!-- counted list -->
    <div id="list" class="grid gap-2"></div>
    <div id="empty" class="text-center opacity-40 py-12">
      <i data-lucide="scan-line" class="w-12 h-12 mx-auto mb-2"></i>
      <p>ยังไม่มีรายการ — เริ่มยิง barcode ได้เลย</p>
    </div>
  </div>

  <div id="toast" class="toast toast-top toast-center z-50"></div>

  <!-- reset confirm -->
  <dialog id="dlgReset" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-lg">เริ่มรอบใหม่?</h3>
      <p class="py-2" id="resetMsg">รายการที่นับยังไม่บันทึกจะถูกล้าง</p>
      <div class="modal-action">
        <button id="btnResetYes" class="btn btn-error">ล้างเลย</button>
        <form method="dialog"><button class="btn">ยกเลิก</button></form>
      </div>
    </div>
  </dialog>

  <script>
    const API_KEY = 'ving_api', SES_KEY = 'ving_session';
    const COUNT_KEY = 'ving_count', SKUS_KEY = 'ving_skus', SID_KEY = 'ving_session_id';

    const ses = (() => { try { return JSON.parse(localStorage.getItem(SES_KEY) || 'null'); } catch { return null; } })();
    if (!ses || !ses.email) { location.href = 'index.html'; }

    let SKUS = {};                       // sku -> {product_name, ...}
    let COUNT = loadCount();             // sku -> {sku, product_name, counted_qty, known}
    let SID = localStorage.getItem(SID_KEY) || newSid();

    function newSid() {
      const d = new Date(), p = n => ('0' + n).slice(-2);
      const id = 'S' + d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + '-' + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
      localStorage.setItem(SID_KEY, id);
      return id;
    }
    function loadCount() { try { return JSON.parse(localStorage.getItem(COUNT_KEY) || '{}'); } catch { return {}; } }
    function saveCount() { localStorage.setItem(COUNT_KEY, JSON.stringify(COUNT)); }

    function toast(msg, type = 'info') {
      const cls = { info:'alert-info', success:'alert-success', error:'alert-error', warning:'alert-warning' }[type] || 'alert-info';
      const el = document.createElement('div');
      el.className = 'alert ' + cls + ' shadow';
      el.textContent = msg;
      document.getElementById('toast').appendChild(el);
      setTimeout(() => el.remove(), 2200);
    }

    async function apiPost(payload) {
      const url = localStorage.getItem(API_KEY) || '';
      if (!url) throw new Error('ยังไม่ได้ตั้งค่า API (กลับหน้าแรก กด ⚙)');
      const res = await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) });
      return res.json();
    }

    // ── load SKU master (cache) ──
    async function loadSkus() {
      const cached = localStorage.getItem(SKUS_KEY);
      if (cached) { try { indexSkus(JSON.parse(cached)); } catch {} }
      try {
        const r = await apiPost({ action: 'load_skus' });
        if (r.ok) { localStorage.setItem(SKUS_KEY, JSON.stringify(r.skus)); indexSkus(r.skus); }
      } catch (err) { toast('โหลดรายการสินค้าไม่ได้ — นับได้แต่จะติด ⚠ ไม่พบ master', 'warning'); }
    }
    function indexSkus(arr) { SKUS = {}; (arr || []).forEach(s => { SKUS[String(s.sku).trim().toUpperCase()] = s; }); }

    // ── scan ──
    const scanEl = document.getElementById('scan');
    function focusScan() { scanEl.focus(); }
    scanEl.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      const raw = scanEl.value.trim();
      scanEl.value = '';
      if (!raw) return;
      addScan(raw);
    });
    // keep focus (warehouse use) — refocus on blur unless typing in a dialog
    scanEl.addEventListener('blur', () => { setTimeout(() => { if (!document.querySelector('dialog[open]')) focusScan(); }, 50); });

    function addScan(raw) {
      const key = raw.toUpperCase();
      const master = SKUS[key];
      const sku = master ? master.sku : raw;
      const skuKey = sku.toUpperCase();
      if (!COUNT[skuKey]) {
        COUNT[skuKey] = { sku, product_name: master ? master.product_name : '', counted_qty: 0, known: !!master };
      }
      COUNT[skuKey].counted_qty += 1;
      saveCount();
      render(skuKey);
      const name = COUNT[skuKey].product_name || sku;
      toast('✓ ' + name + ' = ' + COUNT[skuKey].counted_qty + ' ชิ้น', master ? 'success' : 'warning');
    }

    // ── manual adjust ──
    function adjust(skuKey, delta) {
      if (!COUNT[skuKey]) return;
      COUNT[skuKey].counted_qty += delta;
      if (COUNT[skuKey].counted_qty <= 0) delete COUNT[skuKey];
      saveCount();
      render();
    }
    function removeItem(skuKey) { delete COUNT[skuKey]; saveCount(); render(); }

    // ── render ──
    function render(popKey) {
      const keys = Object.keys(COUNT);
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      let totalQty = 0;
      keys.forEach(k => totalQty += COUNT[k].counted_qty);
      document.getElementById('totalQty').textContent = totalQty;
      document.getElementById('totalSku').textContent = keys.length;
      document.getElementById('sessionLabel').textContent = SID;
      document.getElementById('branchLabel').textContent = ses.branch_name || ses.branch_code || '';

      if (!keys.length) { list.innerHTML = ''; empty.classList.remove('hidden'); lucide.createIcons(); return; }
      empty.classList.add('hidden');

      // newest first (push order ~ insertion; reverse keys array)
      list.innerHTML = keys.reverse().map(k => {
        const it = COUNT[k];
        const badge = it.known ? '' : '<span class="badge badge-warning badge-sm ml-1">⚠ ไม่พบ master</span>';
        const name = it.product_name ? escapeHtml(it.product_name) : '<span class="opacity-50">(ไม่มีชื่อ)</span>';
        return `
        <div class="card bg-base-100 shadow-sm" data-key="${escapeAttr(k)}">
          <div class="card-body p-3 flex-row items-center gap-3">
            <div class="flex-1 min-w-0">
              <p class="font-medium truncate">${name}${badge}</p>
              <p class="text-xs font-mono opacity-50">${escapeHtml(it.sku)}</p>
            </div>
            <div class="flex items-center gap-1">
              <button class="btn btn-ghost btn-xs btn-circle" data-act="minus"><i data-lucide="minus" class="w-4 h-4"></i></button>
              <span class="qty font-display font-bold text-xl w-8 text-center">${it.counted_qty}</span>
              <button class="btn btn-ghost btn-xs btn-circle" data-act="plus"><i data-lucide="plus" class="w-4 h-4"></i></button>
              <button class="btn btn-ghost btn-xs btn-circle text-error" data-act="del"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
        </div>`;
      }).join('');
      lucide.createIcons();

      if (popKey) {
        const card = list.querySelector('[data-key="' + cssEsc(popKey) + '"] .qty');
        if (card) { card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop'); }
      }
    }

    // event delegation for +/-/del
    document.getElementById('list').addEventListener('click', e => {
      const btn = e.target.closest('button[data-act]');
      if (!btn) return;
      const key = btn.closest('[data-key]').getAttribute('data-key');
      const act = btn.getAttribute('data-act');
      if (act === 'plus') adjust(key, 1);
      else if (act === 'minus') adjust(key, -1);
      else if (act === 'del') removeItem(key);
    });

    // ── save ──
    document.getElementById('btnSave').addEventListener('click', async () => {
      const keys = Object.keys(COUNT);
      if (!keys.length) { toast('ยังไม่มีรายการนับ', 'warning'); return; }
      const items = keys.map(k => ({ sku: COUNT[k].sku, product_name: COUNT[k].product_name, counted_qty: COUNT[k].counted_qty }));

      const btn = document.getElementById('btnSave');
      document.getElementById('saveLabel').classList.add('hidden');
      document.getElementById('saveSpin').classList.remove('hidden');
      btn.disabled = true;
      try {
        const r = await apiPost({
          action: 'save_count', session_id: SID,
          branch_code: ses.branch_code, branch_name: ses.branch_name, email: ses.email,
          items,
        });
        if (r.ok) {
          toast('บันทึก ' + r.logged + ' รายการสำเร็จ ✓', 'success');
          COUNT = {}; saveCount();
          localStorage.removeItem(SID_KEY); SID = newSid();
          render();
        } else {
          toast('บันทึกไม่สำเร็จ: ' + (r.error || ''), 'error');
        }
      } catch (err) {
        toast('บันทึกไม่สำเร็จ — ข้อมูลยังอยู่ ลองใหม่: ' + err.message, 'error');
      } finally {
        document.getElementById('saveLabel').classList.remove('hidden');
        document.getElementById('saveSpin').classList.add('hidden');
        btn.disabled = false;
        focusScan();
      }
    });

    // ── reset ──
    document.getElementById('btnReset').addEventListener('click', () => {
      const n = Object.keys(COUNT).length;
      if (!n) { toast('ไม่มีรายการให้ล้าง', 'info'); return; }
      document.getElementById('resetMsg').textContent = 'มี ' + n + ' SKU ที่นับแล้วยังไม่บันทึก — จะถูกล้างทิ้ง';
      document.getElementById('dlgReset').showModal();
    });
    document.getElementById('btnResetYes').addEventListener('click', () => {
      COUNT = {}; saveCount();
      localStorage.removeItem(SID_KEY); SID = newSid();
      document.getElementById('dlgReset').close();
      render(); focusScan();
      toast('เริ่มรอบใหม่แล้ว', 'success');
    });

    // ── escaping helpers ──
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escapeAttr(s){ return escapeHtml(s); }
    function cssEsc(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/["\\]/g, '\\$&'); }

    // ── init ──
    render();
    loadSkus();
    focusScan();
    document.addEventListener('click', e => { if (!e.target.closest('button') && !e.target.closest('input') && !document.querySelector('dialog[open]')) focusScan(); });
  </script>
</body>
</html>
